<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Productos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
  <style>
    :root {
      --accent:       #2563eb;
      --accent-light: #eff6ff;
      --accent-hover: #1d4ed8;
      --success:      #16a34a;
      --success-bg:   #f0fdf4;
      --warning:      #d97706;
      --warning-bg:   #fffbeb;
      --danger:       #dc2626;
      --danger-bg:    #fef2f2;
      --gray-50:      #f8fafc;
      --gray-100:     #f1f5f9;
      --gray-200:     #e2e8f0;
      --gray-300:     #cbd5e1;
      --gray-400:     #94a3b8;
      --gray-500:     #64748b;
      --gray-700:     #334155;
      --gray-900:     #0f172a;
      --radius:       16px;
      --radius-sm:    10px;
      --radius-pill:  999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--gray-100);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 5rem;
      color: var(--gray-900);
    }

    .container { width: 100%; max-width: 640px; }

    /* Header */
    .app-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 1.75rem;
    }

    .app-icon {
      width: 48px; height: 48px;
      background: var(--accent);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .app-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--gray-900);
      line-height: 1.1;
    }

    .app-header p {
      font-size: 13px;
      color: var(--gray-500);
      margin-top: 2px;
    }

    /* Cards */
    .card {
      background: #fff;
      border-radius: var(--radius);
      border: 1px solid var(--gray-200);
      margin-bottom: 12px;
      overflow: hidden;
      animation: up 0.35s ease both;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      padding: 16px 20px 0;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gray-400);
    }

    /* Form */
    .form-body { padding: 14px 20px 20px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .field { display: flex; flex-direction: column; gap: 5px; }

    .field label {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-500);
    }

    .input-wrap { position: relative; }

    input[type="text"], input[type="number"] {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      background: var(--gray-50);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--gray-900);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input::placeholder { color: var(--gray-300); }
    input:hover { border-color: var(--gray-300); }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
      background: #fff;
    }

    input.state-ok {
      border-color: var(--success);
      background: var(--success-bg);
    }

    input.state-warn {
      border-color: var(--warning);
      background: var(--warning-bg);
    }

    .input-with-action {
      display: flex;
      gap: 8px;
    }

    .input-with-action input { flex: 1; min-width: 0; }

    /* Scan button */
    .btn-scan {
      width: 44px; height: 44px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--gray-200);
      background: var(--gray-50);
      color: var(--gray-500);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      font-size: 18px;
    }

    .btn-scan:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    .btn-scan.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    /* Lookup feedback */
    .lookup-bar {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 7px;
      padding: 7px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
    }

    .lookup-bar.loading { display:flex; background:var(--accent-light); color:var(--accent); }
    .lookup-bar.found   { display:flex; background:var(--success-bg);   color:var(--success); }
    .lookup-bar.notfound{ display:flex; background:var(--warning-bg);   color:var(--warning); }
    .lookup-bar.error   { display:flex; background:var(--danger-bg);    color:var(--danger); }

    .spinner {
      width: 13px; height: 13px; flex-shrink: 0;
      border-radius: 50%;
      border: 2px solid rgba(37,99,235,0.2);
      border-top-color: var(--accent);
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Add button */
    .btn-add {
      width: 100%;
      height: 46px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 7px;
      transition: background 0.15s, transform 0.1s;
      margin-top: 4px;
    }

    .btn-add:hover { background: var(--accent-hover); }
    .btn-add:active { transform: scale(0.99); }
    .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      display: none;
      margin-top: 8px;
      padding: 8px 12px;
      background: var(--danger-bg);
      border: 1px solid #fecaca;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      color: var(--danger);
    }

    /* Table */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
      table-layout: fixed;
    }

    thead tr { border-bottom: 1px solid var(--gray-100); }

    th {
      padding: 12px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--gray-400);
      background: var(--gray-50);
    }

    th.r { text-align: right; }

    td {
      padding: 14px 20px;
      border-bottom: 1px solid var(--gray-100);
      color: var(--gray-700);
      vertical-align: middle;
      word-break: break-word;
    }

    td.r { text-align: right; }

    td.mono {
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      color: var(--gray-500);
    }

    td.total {
      font-size: 13px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--gray-900);
    }

    td.action { text-align: center; padding: 14px 8px; width: 44px; }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.1s; }
    tbody tr:hover { background: var(--gray-50); }

    .row-in { animation: rowIn 0.25s ease both; }
    @keyframes rowIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    /* Product name cell */
    .name-cell { display: flex; align-items: center; gap: 10px; }

    .num-badge {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--gray-100);
      border: 1px solid var(--gray-200);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-400);
      flex-shrink: 0;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-verified { background: var(--success); }
    .dot-unknown  { background: var(--warning); }
    .dot-manual   { background: var(--gray-300); }

    /* Delete button */
    .btn-del {
      width: 30px; height: 30px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--gray-300);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      transition: background 0.15s, color 0.15s;
    }
    .btn-del:hover { background: var(--danger-bg); color: var(--danger); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--gray-400);
    }

    .empty-icon {
      font-size: 36px;
      margin-bottom: 10px;
      opacity: 0.5;
    }

    .empty p { font-size: 13px; }

    /* Resumen */
    .summary { border-top: 1px solid var(--gray-100); }

    .summary-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--gray-100);
    }

    .metric {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .metric:first-child { border-right: 1px solid var(--gray-100); }

    .metric-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--gray-400);
    }

    .metric-val {
      font-size: 22px;
      font-weight: 700;
      color: var(--gray-900);
    }

    .total-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
    }

    .total-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-500);
    }

    .total-val {
      font-size: 26px;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    .clear-row {
      padding: 0 20px 16px;
      display: flex;
      justify-content: flex-end;
    }

    .btn-clear {
      height: 34px;
      padding: 0 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--gray-200);
      background: transparent;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-500);
      cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      transition: all 0.15s;
    }

    .btn-clear:hover { background: var(--danger-bg); color: var(--danger); border-color: #fecaca; }

    /* Scanner overlay */
    .scanner-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.6);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }

    @media (min-width: 520px) {
      .scanner-overlay { align-items: center; padding: 1rem; }
    }

    .scanner-overlay.visible { display: flex; }

    .scanner-sheet {
      background: #fff;
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 440px;
      overflow: hidden;
      animation: sheetUp 0.28s cubic-bezier(.2,.8,.4,1) both;
    }

    @media (min-width: 520px) {
      .scanner-sheet { border-radius: var(--radius); animation-name: sheetIn; }
    }

    @keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    @keyframes sheetIn { from{opacity:0;transform:scale(0.96)} to{opacity:1;transform:scale(1)} }

    .scanner-header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--gray-100);
    }

    .scanner-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-900);
    }

    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: blink 1.2s ease infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .btn-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--gray-100);
      color: var(--gray-500);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: background 0.15s;
    }
    .btn-close:hover { background: var(--gray-200); }

    .scanner-body { padding: 16px 20px 24px; }

    .video-frame {
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 4/3;
      position: relative;
      border: 2px solid var(--gray-200);
    }

    #preview { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* scan line */
    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      opacity: 0.85;
      animation: scanMove 2s ease-in-out infinite;
      box-shadow: 0 0 10px rgba(37,99,235,0.6);
    }
    @keyframes scanMove { 0%{top:10%}50%{top:88%}100%{top:10%} }

    /* corners */
    .frame-corners { position:absolute;inset:0;pointer-events:none; }
    .frame-corners::before,.frame-corners::after,
    .frame-corners span::before,.frame-corners span::after {
      content:'';position:absolute;width:22px;height:22px;
      border-color:var(--accent);border-style:solid;
    }
    .frame-corners::before  { top:12px;left:12px;  border-width:3px 0 0 3px;border-radius:4px 0 0 0; }
    .frame-corners::after   { top:12px;right:12px; border-width:3px 3px 0 0;border-radius:0 4px 0 0; }
    .frame-corners span::before { bottom:12px;left:12px;  border-width:0 0 3px 3px;border-radius:0 0 0 4px; }
    .frame-corners span::after  { bottom:12px;right:12px; border-width:0 3px 3px 0;border-radius:0 0 4px 0; }

    .scan-hint { text-align:center;font-size:12px;color:var(--gray-400);margin-top:10px; }
    .scan-status-bar { text-align:center;font-size:13px;font-weight:500;margin-top:6px;min-height:20px;color:var(--gray-400); }
    .scan-status-bar.ok  { color:var(--success); }
    .scan-status-bar.err { color:var(--danger); }

    .cam-select-wrap { margin-top:12px;display:none; }
    .cam-select-wrap label { font-size:11px;font-weight:600;color:var(--gray-400);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px; }
    .cam-select-wrap select {
      width:100%;height:40px;padding:0 12px;
      border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
      font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;
      color:var(--gray-700);background:#fff;outline:none;
    }

    @media (max-width:560px) {
      .form-row { grid-template-columns:1fr 1fr; }
      .form-row .field:first-child { grid-column:1/-1; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="app-header">
    <div class="app-icon">🧮</div>
    <div>
      <h1>Calculadora de productos</h1>
      <p>Escanea o ingresa tus productos</p>
    </div>
  </div>

  <!-- Formulario -->
  <div class="card" style="animation-delay:0.05s">
    <p class="card-title">Agregar producto</p>
    <div class="form-body">
      <div class="form-row">
        <div class="field" style="grid-column:1/-1">
          <label for="inp-nombre">Nombre del producto</label>
          <div class="input-with-action">
            <input type="text" id="inp-nombre" placeholder="Escribe o usa el escáner →" />
            <button class="btn-scan" id="btn-scan" onclick="toggleScanner()" aria-label="Escanear código de barras">
              📷
            </button>
          </div>
          <div class="lookup-bar" id="lookup-bar">
            <div class="spinner" id="lookup-spinner"></div>
            <span id="lookup-msg"></span>
          </div>
        </div>
        <div class="field">
          <label for="inp-cantidad">Cantidad</label>
          <input type="number" id="inp-cantidad" placeholder="0" min="0" step="1" />
        </div>
        <div class="field">
          <label for="inp-valor">Valor unitario ($)</label>
          <input type="number" id="inp-valor" placeholder="0.00" min="0" step="0.01" />
        </div>
      </div>
      <button class="btn-add" id="btn-add" onclick="agregarProducto()">
        + &nbsp;Agregar producto
      </button>
      <p class="error-msg" id="msg-error"></p>
    </div>
  </div>

  <!-- Lista -->
  <div class="card" style="animation-delay:0.1s">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:40%;">Producto</th>
            <th class="r" style="width:14%;">Cant.</th>
            <th class="r" style="width:20%;">Valor unit.</th>
            <th class="r" style="width:20%;">Total</th>
            <th style="width:6%;"></th>
          </tr>
        </thead>
        <tbody id="tabla-body">
          <tr>
            <td colspan="5" style="padding:0;border:none;">
              <div class="empty">
                <div class="empty-icon">📦</div>
                <p>Aún no hay productos</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="summary" class="summary" style="display:none;">
      <div class="summary-metrics">
        <div class="metric">
          <span class="metric-label">Productos</span>
          <span class="metric-val" id="res-items">0</span>
        </div>
        <div class="metric">
          <span class="metric-label">Unidades</span>
          <span class="metric-val" id="res-unidades">0</span>
        </div>
      </div>
      <div class="total-row">
        <span class="total-label">Gran total</span>
        <span class="total-val" id="res-total">$0</span>
      </div>
      <div class="clear-row">
        <button class="btn-clear" onclick="limpiarTodo()">✕ Limpiar todo</button>
      </div>
    </div>
  </div>

</div>

<!-- Scanner Sheet -->
<div class="scanner-overlay" id="scanner-overlay" onclick="handleOverlayClick(event)">
  <div class="scanner-sheet">
    <div class="scanner-header">
      <div class="scanner-title">
        <span class="live-dot"></span>
        Escáner de código
      </div>
      <button class="btn-close" onclick="cerrarScanner()" aria-label="Cerrar">✕</button>
    </div>
    <div class="scanner-body">
      <div class="video-frame">
        <video id="preview" muted playsinline></video>
        <div class="scan-line"></div>
        <div class="frame-corners"><span></span></div>
      </div>
      <div class="cam-select-wrap" id="cam-select-wrap">
        <label for="cam-select">Cámara</label>
        <select id="cam-select" onchange="cambiarCamara()"></select>
      </div>
      <p class="scan-hint">Apunta la cámara al código de barras o QR</p>
      <p class="scan-status-bar" id="scan-status">Iniciando cámara...</p>
    </div>
  </div>
</div>

<script>
  let productos = [];
  let codeReader = null;
  let scannerActivo = false;
  let camaras = [];
  let camaraActual = null;
  let buscando = false;

  function fmt(n) {
    return '$' + n.toLocaleString('es-CL', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }

  function mostrarError(msg) {
    const el = document.getElementById('msg-error');
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }

  function setLookup(estado, msg) {
    const bar     = document.getElementById('lookup-bar');
    const spinner = document.getElementById('lookup-spinner');
    const msgEl   = document.getElementById('lookup-msg');
    bar.className = 'lookup-bar';
    spinner.style.display = 'none';
    if (!estado) return;
    bar.classList.add(estado);
    msgEl.textContent = msg;
    if (estado === 'loading') spinner.style.display = 'block';
  }

  /* ---- Open Food Facts ---- */
  async function buscarProducto(barcode) {
    buscando = true;
    document.getElementById('btn-add').disabled = true;
    setLookup('loading', 'Buscando producto...');

    try {
      const urls = [
        `https://world.openfoodfacts.org/api/v0/product/${barcode}.json`,
        `https://cl.openfoodfacts.org/api/v0/product/${barcode}.json`
      ];

      let nombre = null;

      for (const url of urls) {
        const res  = await fetch(url, { signal: AbortSignal.timeout(6000) });
        const data = await res.json();
        if (data.status === 1 && data.product) {
          const p = data.product;
          nombre =
            p.product_name_es ||
            p.product_name    ||
            p.generic_name_es ||
            p.generic_name    ||
            p.brands          ||
            null;
          if (nombre) { nombre = nombre.trim(); break; }
        }
      }

      const inp = document.getElementById('inp-nombre');
      if (nombre) {
        inp.value = nombre;
        inp.className = 'state-ok';
        inp.dataset.origen = 'found';
        setLookup('found', '✓ Producto encontrado');
        setTimeout(() => setLookup(null), 3000);
        document.getElementById('inp-cantidad').focus();
      } else {
        inp.value = barcode;
        inp.className = 'state-warn';
        inp.dataset.origen = 'unknown';
        setLookup('notfound', 'Producto no encontrado — edita el nombre');
        inp.focus(); inp.select();
      }
    } catch {
      const inp = document.getElementById('inp-nombre');
      inp.value = barcode;
      inp.dataset.origen = 'unknown';
      setLookup('error', 'Sin conexión — edita el nombre manualmente');
      inp.focus(); inp.select();
    } finally {
      buscando = false;
      document.getElementById('btn-add').disabled = false;
    }
  }

  /* ---- Agregar ---- */
  function agregarProducto() {
    if (buscando) return;
    const inp      = document.getElementById('inp-nombre');
    const nombre   = inp.value.trim();
    const cantidad = parseFloat(document.getElementById('inp-cantidad').value);
    const valor    = parseFloat(document.getElementById('inp-valor').value);

    if (!nombre)                          { mostrarError('Ingresa el nombre del producto.'); return; }
    if (isNaN(cantidad) || cantidad <= 0) { mostrarError('Ingresa una cantidad válida mayor a 0.'); return; }
    if (isNaN(valor)    || valor < 0)     { mostrarError('Ingresa un valor unitario válido.'); return; }
    mostrarError('');

    productos.push({ nombre, cantidad, valor, total: cantidad * valor, origen: inp.dataset.origen || 'manual' });

    inp.value = ''; inp.className = '';
    delete inp.dataset.origen;
    document.getElementById('inp-cantidad').value = '';
    document.getElementById('inp-valor').value    = '';
    setLookup(null);
    inp.focus();
    renderTabla();
  }

  function eliminarProducto(i) { productos.splice(i,1); renderTabla(); }

  function limpiarTodo() {
    if (!confirm('¿Eliminar todos los productos?')) return;
    productos = []; renderTabla();
  }

  /* ---- Render ---- */
  function renderTabla() {
    const tbody   = document.getElementById('tabla-body');
    const summary = document.getElementById('summary');

    if (productos.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" style="padding:0;border:none;"><div class="empty"><div class="empty-icon">📦</div><p>Aún no hay productos</p></div></td></tr>`;
      summary.style.display = 'none';
      return;
    }

    let rows = '', gran = 0, uds = 0;

    productos.forEach((p, i) => {
      gran += p.total; uds += p.cantidad;
      const dotClass = p.origen === 'found' ? 'dot-verified' : p.origen === 'manual' ? 'dot-manual' : 'dot-unknown';
      const dotTitle = p.origen === 'found' ? 'Verificado' : p.origen === 'manual' ? 'Manual' : 'Sin datos';
      rows += `<tr class="row-in">
        <td>
          <div class="name-cell">
            <span class="num-badge">${i+1}</span>
            <span class="status-dot ${dotClass}" title="${dotTitle}"></span>
            <span>${p.nombre}</span>
          </div>
        </td>
        <td class="r mono">${p.cantidad}</td>
        <td class="r mono">${fmt(p.valor)}</td>
        <td class="r total">${fmt(p.total)}</td>
        <td class="action">
          <button class="btn-del" onclick="eliminarProducto(${i})" aria-label="Eliminar">✕</button>
        </td>
      </tr>`;
    });

    tbody.innerHTML = rows;
    document.getElementById('res-items').textContent    = productos.length;
    document.getElementById('res-unidades').textContent = uds;
    document.getElementById('res-total').textContent    = fmt(gran);
    summary.style.display = 'block';
  }

  /* ---- Scanner ---- */
  function toggleScanner() { scannerActivo ? cerrarScanner() : abrirScanner(); }

  async function abrirScanner() {
    document.getElementById('scanner-overlay').classList.add('visible');
    document.getElementById('btn-scan').classList.add('active');
    setStatus('Iniciando cámara...', '');
    scannerActivo = true;

    try {
      codeReader = new ZXing.BrowserMultiFormatReader();
      camaras    = await codeReader.listVideoInputDevices();
      if (!camaras.length) { setStatus('No se encontró ninguna cámara.', 'err'); return; }

      const trasera = camaras.find(c => /back|rear|environment/i.test(c.label));
      camaraActual  = trasera ? trasera.deviceId : camaras[camaras.length-1].deviceId;

      if (camaras.length > 1) {
        const sel = document.getElementById('cam-select');
        sel.innerHTML = '';
        camaras.forEach(c => {
          const o = document.createElement('option');
          o.value = c.deviceId;
          o.textContent = c.label || `Cámara ${c.deviceId.slice(0,8)}`;
          if (c.deviceId === camaraActual) o.selected = true;
          sel.appendChild(o);
        });
        document.getElementById('cam-select-wrap').style.display = 'block';
      }

      iniciarLectura(camaraActual);
    } catch(e) {
      setStatus('Error: ' + (e.message||e), 'err');
    }
  }

  function iniciarLectura(deviceId) {
    setStatus('Buscando código...', '');
    codeReader.decodeFromVideoDevice(deviceId, 'preview', result => {
      if (result) onDetectado(result.getText());
    });
  }

  function cambiarCamara() {
    camaraActual = document.getElementById('cam-select').value;
    codeReader.reset();
    iniciarLectura(camaraActual);
  }

  function onDetectado(barcode) {
    setStatus('✓ Código detectado', 'ok');
    if (navigator.vibrate) navigator.vibrate(100);
    setTimeout(async () => { cerrarScanner(); await buscarProducto(barcode); }, 500);
  }

  function cerrarScanner() {
    if (codeReader) { codeReader.reset(); codeReader = null; }
    document.getElementById('scanner-overlay').classList.remove('visible');
    document.getElementById('btn-scan').classList.remove('active');
    document.getElementById('cam-select-wrap').style.display = 'none';
    document.getElementById('cam-select').innerHTML = '';
    scannerActivo = false;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('scanner-overlay')) cerrarScanner();
  }

  function setStatus(msg, tipo) {
    const el = document.getElementById('scan-status');
    el.textContent = msg;
    el.className = 'scan-status-bar' + (tipo ? ' '+tipo : '');
  }

  document.getElementById('inp-nombre').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('inp-cantidad').focus();
  });
  document.getElementById('inp-cantidad').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('inp-valor').focus();
  });
  document.getElementById('inp-valor').addEventListener('keydown', e => {
    if (e.key === 'Enter') agregarProducto();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && scannerActivo) cerrarScanner();
  });
  document.getElementById('inp-nombre').addEventListener('input', () => {
    const inp = document.getElementById('inp-nombre');
    inp.className = '';
    inp.dataset.origen = 'manual';
    setLookup(null);
  });
</script>

</body>
</html>
